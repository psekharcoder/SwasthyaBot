<div class="layout">

  <!-- Sidebar -->
  <app-sidebar (newChatClicked)="startNewChat()">
  </app-sidebar>

  <div class="main">

    <!-- Navbar -->
    <app-navbar></app-navbar>

    <!-- Chat Area -->
    <div class="chat-container">

      <!-- Chat Body -->
      <div class="chat-body" #chatBody>

        <!-- Welcome Screen -->
        <div class="welcome-screen" *ngIf="chat.currentChat.messages.length === 0">

          <div class="welcome-icon">
            🩺
          </div>

          <h1>Welcome to SwasthyaBot</h1>

          <p>Your AI Healthcare Assistant</p>

          <div class="suggestions">

            <div class="card" (click)="selectSuggestion('What are the common symptoms of fever?')">
              🤒 Symptoms
            </div>

            <div class="card" (click)="selectSuggestion('Suggest a healthy diet plan.')">
              🍎 Diet
            </div>

            <div class="card" (click)="selectSuggestion('How can I improve my fitness?')">
              🏃 Fitness
            </div>

            <div class="card" (click)="selectSuggestion('Tell me about common medicines for cold and fever.')">
              💊 Medicines
            </div>

            <div class="card" (click)="selectSuggestion('How can I improve my mental health?')">
              🧠 Mental Health
            </div>

            <div class="card" (click)="selectSuggestion('Give me tips for a healthy lifestyle.')">
              ❤️ Healthy Lifestyle
            </div>

          </div>

          <span class="welcome-footer">
            Start by asking your first health question...
          </span>

        </div>

        <!-- Messages -->
        <app-message *ngFor="let msg of chat.currentChat.messages" [msg]="msg">
        </app-message>

        <!-- Typing -->
        <div class="message bot" *ngIf="isTyping">

          <div class="avatar">
            🤖
          </div>

          <div class="bubble typing">
            <span></span>
            <span></span>
            <span></span>
          </div>

        </div>

      </div>

      <!-- Footer -->
      <div class="chat-footer">

        <!-- Upload Button -->
        <button mat-mini-fab color="primary" (click)="fileInput.click()">

          📎

        </button>

        <!-- Hidden File Picker -->
        <input type="file" hidden #fileInput (change)="onFileSelected($event)">

        <!-- Message Box -->
        <mat-form-field appearance="outline" class="message-box">

          <input matInput placeholder="Ask your health question..." [(ngModel)]="message" (keyup.enter)="sendMessage()">

        </mat-form-field>

        <!-- Mic -->
        <button mat-fab color="accent" (click)="startListening()">

          {{ isListening ? '🎙️' : '🎤' }}

        </button>

        <!-- Send -->
        <button mat-fab color="primary" (click)="sendMessage()">

          ➤

        </button>

        <!-- Voice -->
        <button mat-fab color="warn" (click)="toggleVoice()">

          {{ voiceEnabled ? '🔊' : '🔇' }}

        </button>

      </div>

    </div>

  </div>

</div>
